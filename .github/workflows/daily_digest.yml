name: Generate Daily Digest — החדשות של אמה

on:
  schedule:
    # 04:00 UTC = 07:00 Israel time (summer) / 06:00 (winter)
    - cron: '0 4 * * *'

  # Allows manual trigger from GitHub UI for testing
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_digest.py

      - name: Commit and push
        run: |
          git config user.name "Ema News Bot"
          git config user.email "bot@ema-news"
          git add docs/
          git diff --staged --quiet || git commit -m "📰 Daily digest $(date +'%Y-%m-%d')"
          git push
